<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scout Compass</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <style>
        * { box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f7f6; /* Premium soft off-white */
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        
        .header {
            position: absolute;
            top: 40px;
            text-align: center;
            letter-spacing: 1.5px;
            color: #2c3e50;
        }
        .header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Premium Light Compass Dial */
        .compass-outer {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: #ffffff;
            /* Soft, premium multi-layered shadow */
            box-shadow: 0 20px 50px rgba(0,0,0,0.08), 
                        0 0 0 12px rgba(255,255,255,0.8),
                        inset 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .compass-inner {
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1px solid #eaeaea;
            transition: transform 0.1s ease-out;
        }
        
        .mark {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 700;
            font-size: 22px;
            color: #95a5a6;
        }
        .n { top: 15px; color: #ff3b30; font-size: 26px; } /* Apple Red for North */
        .s { bottom: 15px; }
        .e { top: 50%; right: 20px; transform: translateY(-50%); }
        .w { top: 50%; left: 20px; transform: translateY(-50%); }
        
        .needle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 5;
            transition: transform 0.1s ease-out;
        }
        .needle-north {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 130px solid #ff3b30; /* Premium Red */
            filter: drop-shadow(0 -4px 4px rgba(255, 59, 48, 0.3));
        }
        .needle-south {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 130px solid #bdc3c7; /* Silver */
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }
        .center-pin {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #ffffff;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border: 6px solid #2c3e50;
        }
        
        /* Information Readout */
        .info-panel {
            margin-top: 60px;
            text-align: center;
            background: #ffffff;
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .heading-text { 
            font-size: 48px; 
            font-weight: 800; 
            margin: 0; 
            color: #2c3e50; 
            letter-spacing: -1px;
        }
        .cardinal-text { 
            font-size: 18px; 
            font-weight: 600;
            color: #7f8c8d; 
            margin-top: 2px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Buttons */
        .btn-group {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 15px;
        }
        button {
            background: #ffffff;
            color: #2c3e50;
            border: 1px solid #e0e0e0;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: all 0.2s ease;
        }
        button:active { 
            transform: scale(0.96); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
        }
        #installBtn { 
            display: none; 
            background: #007aff; /* Apple Blue */
            color: white; 
            border: none;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }
        #startBtn { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h3>Scout Compass</h3>
    </div>

    <div class="compass-outer">
        <div class="compass-inner" id="compassRing">
            <div class="mark n">N</div>
            <div class="mark s">S</div>
            <div class="mark e">E</div>
            <div class="mark w">W</div>
        </div>
        <div class="needle-container" id="needle">
            <div class="needle-north"></div>
            <div class="needle-south"></div>
        </div>
        <div class="center-pin"></div>
    </div>

    <div class="info-panel">
        <div class="heading-text" id="degree">0°</div>
        <div class="cardinal-text" id="cardinal">North</div>
    </div>

    <div class="btn-group">
        <button id="startBtn">Calibrate Sensor</button>
        <button id="installBtn">⬇ Install App</button>
    </div>

    <script>
        // --- COMPASS LOGIC ---
        const needle = document.getElementById('needle');
        const degreeText = document.getElementById('degree');
        const cardinalText = document.getElementById('cardinal');
        const startBtn = document.getElementById('startBtn');

        function getDirectionText(degree) {
            if (degree >= 337.5 || degree < 22.5) return "North";
            if (degree >= 22.5 && degree < 67.5) return "North-East";
            if (degree >= 67.5 && degree < 112.5) return "East";
            if (degree >= 112.5 && degree < 157.5) return "South-East";
            if (degree >= 157.5 && degree < 202.5) return "South";
            if (degree >= 202.5 && degree < 247.5) return "South-West";
            if (degree >= 247.5 && degree < 292.5) return "West";
            if (degree >= 292.5 && degree < 337.5) return "North-West";
        }

        function handleOrientation(e) {
            let compass = e.webkitCompassHeading || Math.abs(e.alpha - 360);
            if (compass !== null) {
                let deg = Math.round(compass);
                needle.style.transform = `rotate(${deg}deg)`;
                degreeText.innerText = deg + '°';
                cardinalText.innerText = getDirectionText(deg);
            }
        }

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            startBtn.style.display = 'block';
            startBtn.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response == 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            startBtn.style.display = 'none';
                        }
                    }).catch(console.error);
            });
        } else {
            window.addEventListener('deviceorientationabsolute', handleOrientation);
            window.addEventListener('deviceorientation', handleOrientation);
        }

        // --- PWA / OFFLINE LOGIC ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW setup failed', err));
            });
        }

        // --- INSTALL BUTTON LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
